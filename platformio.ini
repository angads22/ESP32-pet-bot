; PetBot — PlatformIO build configuration
; AI-Thinker ESP32-CAM (4 MB flash, no PSRAM)
;
; Build with:  pio run -e petbot_ble      (default, BLE-only)
;              pio run -e petbot_wifi     (WiFi + web UI)
;              pio run -e petbot_stream   (WiFi + web UI + camera stream)
;
; Flash with:  pio run -e petbot_wifi -t upload
; Monitor:     pio device monitor

[platformio]
default_envs = petbot_ble

[env]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 921600

[env:petbot_ble]
; BLE-only build — fits the default 1.3 MB app partition, no extra flags needed

[env:petbot_wifi]
build_flags = -DPETBOT_ENABLE_WIFI=1
board_build.partitions = huge_app.csv

[env:petbot_stream]
build_flags =
    -DPETBOT_ENABLE_WIFI=1
    -DPETBOT_ENABLE_STREAM=1
board_build.partitions = huge_app.csv
